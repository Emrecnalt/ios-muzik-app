name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: List files in ios directory
        run: ls -R ios

      - name: Build Xcode project (Unsigned)
        run: |
          cd ios
          SCHEME_NAME=$(xcodebuild -list -workspace *.xcworkspace | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Building Scheme: $SCHEME_NAME"
          xcodebuild -workspace *.xcworkspace \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/Payload
          echo "Searching for .app bundles in the entire workspace..."
          find . -name "*.app"
          APP_PATH=$(find . -name "*.app" | grep -v "node_modules" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found!"
            echo "Displaying repository file structure for debugging:"
            find . -maxdepth 4 -not -path '*/.*' -not -path './node_modules*'
            exit 1
          fi
          echo "Found App Bundle at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ../muzik-app.ipa Payload
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: muzik-app.ipa
