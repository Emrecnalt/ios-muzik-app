name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -n 1)
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios

      - name: Disable CocoaPods targets code signing
        run: node scripts/disable-pod-signing.js

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: List Xcode Schemes
        run: |
          cd ios
          xcodebuild -list -workspace *.xcworkspace

      - name: Build Xcode project (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
            -scheme "muzikapp" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/Payload
          echo "Searching for .app bundle in the xcarchive..."
          APP_PATH=$(find ios/build/App.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in App.xcarchive!"
            echo "Searching entire workspace for any .app bundle..."
            APP_PATH=$(find . -name "*.app" | grep -v "node_modules" | head -n 1)
            if [ -z "$APP_PATH" ]; then
              echo "Error: Absolutely no .app bundle found!"
              exit 1
            fi
          fi
          echo "Found App Bundle at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ../muzik-app.ipa Payload
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: muzik-app.ipa
